name: Build standalone apps

# Builds the double-click Hildegard app for macOS and Windows with PyInstaller.
# Run it from the Actions tab (workflow_dispatch), or push a tag like v1.0 to
# also publish the apps as downloadable assets on a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: Hildegard-macOS
            bundle_path: dist/Hildegard.app
          - os: windows-latest
            artifact: Hildegard-Windows
            bundle_path: dist/Hildegard
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean Hildegard.spec

      - name: Zip the app (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Hildegard.app" "../${{ matrix.artifact }}.zip"

      - name: Zip the app (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/Hildegard/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Attach to release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
